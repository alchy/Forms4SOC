    communication_method: E-mail / telefon
    sla: Do 30 min (High / Critical) nebo výpadek VPN > 30 min
    note: null
  - recipient: VPN uživatelé
    communication_method: Hromadný e-mail / intranet
    sla: Do 30 min od potvrzení výpadku
    note: null
  - recipient: ISP NOC
    communication_method: Telefon / NOC ticket
    sla: Ihned při volumetrickém útoku přesahujícím kapacitu linky
    note: null
  - recipient: CERT / NÚKIB
    communication_method: Datová schránka
    sla: Dle regulatorní povinnosti (NIS2 apod.)
    note: null
- id: closure
  title: Klasifikace a uzavření
  type: form
  description: Uzavření provádí SOC Analytický tým po obnově dostupnosti VPN a dokončení Odezvy, nebo ihned po Posouzení, třídění a rozhodování u False Positive. Klasifikace a Severity vyjadřují finální stav po Posouzení, třídění a rozhodování.
  hint: Před uzavřením ověř, že VPN je plně dostupná pro legitimní uživatele a všechna zavedená opatření Odezvy jsou zdokumentována.<br><br><b>Metodika klasifikace – Úroveň dopadu:</b><br><b>Nízká</b> – incidenty s omezeným nebo lokálním dopadem; žádný dopad na regulovanou službu.<br><b>Střední</b> – postihují důležité systémy, ale nezpůsobují kompletní přerušení klíčových procesů; nezasahuje aktiva regulované služby.<br><b>Vysoká</b> – významný dopad na klíčové procesy nebo systémy; při zasažení aktiv regulované služby splňují kritéria KBI dle ZKB; ohrožují kontinuitu činnosti nebo reputaci.<br><b>Kritická</b> – katastrofický dopad; vedou k úplnému kolapsu regulované služby, mají masivní finanční nebo právní důsledky a ohrožují existenci podniku nebo jeho způsobilost; jde vždy o KBI.
  fields:
  - key: final_classification
    label: Klasifikace výsledku
    type: select
    options:
    - True Positive
    - False Positive
    - Benign True Positive
    hint: 'False Positive: výpadek VPN způsoben provozní chybou nebo výpadkem linky bez útočné aktivity.'
    example: True Positive
  - key: impact_level
    label: Úroveň dopadu
    type: select
    options:
    - Nízká
    - Střední
    - Vysoká
    - Kritická
    option_hints:
      Nízká: Incidenty s omezeným nebo lokálním dopadem. Žádný dopad na regulovanou službu.
      Střední: Incidenty, které postihují důležité systémy, ale nezpůsobují kompletní přerušení klíčových procesů. Nezasahuje aktiva regulované služby.
      Vysoká: Incidenty s významným dopadem na klíčové procesy nebo systémy. Při zasažení aktiv regulované služby splňují kritéria KBI dle ZKB. Ohrožují kontinuitu činnosti nebo reputaci.
      Kritická: Incidenty s katastrofickým dopadem. Vedou k úplnému kolapsu regulované služby, mají masivní finanční nebo právní důsledky a ohrožují existenci podniku nebo jeho způsobilost. Jde vždy o KBI.
    hint: Úroveň Vysoká a Kritická při zasažení regulované služby zakládají povinnost hlášení NÚKIB a ÚCL.
  - key: nukib_notification_required
    label: Povinnost hlášení NÚKIB
    type: select
    options:
    - Povinná – Regulovaná služba + Vysoká/Kritická (ZOKB §8, vyhl. 82/2018 Sb.)
    - Zvážit – hraniční případ
    - Není vyžadována
    hint: 'Lhůty: do 24 h (první hlášení) · do 72 h (detailní hlášení) · do 30 dní (závěrečná zpráva) – dle vyhlášky č. 82/2018 Sb.'
  - key: ucl_notification_required
    label: Povinnost hlášení ÚCL
    type: select
    options:
    - Povinná – Regulovaná letecká služba + P1/P2
    - Zvážit – hraniční případ
    - Není vyžadována
    hint: ÚCL (Úřad pro civilní letectví) – hlášení povinné při Vysokém nebo Kritickém dopadu (P1/P2) na regulovanou leteckou službu.
  - key: impact_primary_service
    label: Dostupnost primárních služeb organizace
    type: select
    options:
    - Zcela nedostupné
    - Částečně nedostupné / degradované
    - Dostupné bez omezení
    - Netýká se
    hint: Primární = služby poskytované organizací klientům / uživatelům nebo klíčové interní provozní procesy.
  - key: impact_scope
    label: Rozsah zasažených uživatelů / systémů
    type: select
    options:
    - Celoplošný (> 50 % uživatelů nebo klíčových systémů)
    - Významný (10–50 %)
    - Omezený (< 10 %)
    - Individuální (1 uživatel / 1 systém)
  - key: impact_duration
    label: Doba výpadku / narušení (dostupnost)
    type: select
    options:
    - '> 4 hodiny'
    - 1–4 hodiny
    - 15 min – 1 hodina
    - < 15 min
    - Žádný výpadek / narušení
  - key: impact_data
    label: Dopad na data (důvěrnost / integrita)
    type: select
    options:
    - Exfiltrace dat potvrzena
    - Neoprávněný přístup k datům potvrzen
    - Integrita dat narušena
    - Žádný dopad na data
    - Nelze určit
  - key: attack_type_final
    label: Typ útoku (finální)
    type: select
    options:
    - T1498.001 – Direct Network Flood (SYN / UDP / ICMP flood)
    - T1498.002 – Reflection Amplification (DNS / NTP / SSDP)
    - T1499.003 – Application Exhaustion Flood (SSL/TLS exhaustion)
    - Kombinace typů
    - Nelze určit
  - {key: attack_volume, label: Objem útoku (Gbps / Mpps), example: '4,8 Gbps · 6,2 Mpps'}
  - {key: attack_duration, label: Doba trvání útoku, example: '1 hod 33 min (08:11–09:44)'}
  - {key: vpn_outage_duration, label: Doba výpadku VPN, example: '1 hod 12 min (08:14–09:26)'}
  - key: root_cause
    label: Root Cause
    type: textarea
    example: Volumetrický UDP flood (botnet) zaměřený na VPN GW Cisco ASA. Útok přesáhl kapacitu internetové linky – mitigace vyžadovala součinnost ISP NOC.
  - key: actions_taken
    label: Popis přijatých opatření
    type: textarea
    example: Rate limiting a SYN proxy aktivovány na ASA · blokace 24 zdrojových /24 CIDR bloků na FW · geo-blocking CN/RU/UA/BR · ISP upstream mitigation aktivována
  - key: recommendations
    label: Doporučení pro zlepšení
    type: textarea
    example: Zvážit smluvní zajištění scrubbing centra / anti-DDoS cloudové ochrany. Prověřit možnost BGP blackhole routingu u ISP. Zvýšit práh SIEM alerting pravidla pro dřívější detekci.
  - key: related_service_requests
    label: Související servisní požadavky
    type: textarea
    hint: Čísla nebo odkazy na servisní požadavky vytvořené v průběhu řešení (změny konfigurace FW, ASA, IPS apod.)
  - key: reporter_notified
    label: Oznamovatel informován
    type: select
    options:
    - Ano
    - Ne
  - key: vpn_availability_confirmed
    label: Dostupnost VPN ověřena po obnově
    type: select
    options:
    - Ano
    - Ne
  - {key: closed_at, label: Datum uzavření, type: datetime}
