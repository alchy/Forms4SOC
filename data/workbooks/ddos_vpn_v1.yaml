template_id: ddos-vpn-v1
name: DDoS útok na VPN (Cisco AnyConnect)
version: '1.0'
category: DDoS
status: active
description: Playbook pro řešení incidentů typu DDoS zaměřených na VPN službu organizace (Cisco AnyConnect / Cisco ASA). Pokrývá volumetrické útoky (SYN/UDP/ICMP flood), reflection/amplification útoky i aplikační útoky (SSL/TLS exhaustion). Kroky Odezvy jsou podmíněné – závisí na dostupnosti ochranných opatření v prostředí organizace. Blokace zdrojových adres je povolena výhradně na úrovni CIDR bloků (/24 nebo větší).
mitre_tactic: Impact
mitre_technique: T1498 – Network Denial of Service
mitre_subtechnique: T1498.001
data_sources:
- NetFlow / sFlow / IPFIX
- Firewall / NGFW logy
- IPS / IDS
- Cisco ASA / FTD logy
- ISP telemetrie / NOC
- SIEM
sections:
- id: header
  type: workbook_header
  title: Hlavička
  fields:
  - key: case_title
    label: Stručný popis události
    hint: Výstižný popis pro odlišení od ostatních případů stejné šablony
    example: DDoS útok na VPN – zahlcení služby Cisco AnyConnect
  - {key: ticket_id, label: Ticket ID, editable: false, auto_value: case_id}
  - {key: workbook_name, label: Název workbooku, editable: false, auto_value: template_name}
  - {key: workbook_id, label: Workbook ID, editable: false, value: 2026-003}
  - {key: version, label: Verze, editable: false, auto_value: template_version}
  - {key: last_updated, label: Datum poslední aktualizace, editable: false, value: '2026-03-06'}
  - {key: author, label: Autor / vlastník šablony, editable: false, value: SOC Analytický tým}
  - key: incident_coordinator
    label: Koordinátor incidentu
    hint: SOC Analytik odpovědný za řešení incidentu – vyplní se tlačítkem Převzít.
  - {key: workbook_status, label: Status, editable: false, auto_value: template_status}
- id: classification
  type: classification
  title: Klasifikace
  fields:
  - {key: mitre_tactic, label: MITRE Tactic, editable: false, auto_value: template_mitre_tactic}
  - {key: mitre_technique, label: MITRE Technique, editable: false, auto_value: template_mitre_technique}
  - key: mitre_subtechnique
    label: MITRE Sub-technique
    type: select
    options:
    - T1498.001 – Direct Network Flood (SYN / UDP / ICMP flood)
    - T1498.002 – Reflection Amplification (DNS / NTP / SSDP)
    - T1499.003 – Application Exhaustion Flood (SSL/TLS exhaustion)
    - Kombinace typů
    - Nelze určit
    hint: Vyplň po Posouzení, třídění a rozhodování, kdy je znám konkrétní typ útoku. Pokud jde o kombinaci typů (např. volumetrický + SSL exhaustion), vyber 'Kombinace typů'.
