- id: triage_investigation
  title: Posouzení, třídění a rozhodování
  type: checklist
  description: Cílem je potvrdit DDoS útok, identifikovat jeho typ a rozsah, zmapovat zdrojové adresní bloky a připravit podklady pro Odezva. Klasifikace (True/False Positive, Severity) se v průběhu může upřesňovat — finální klasifikace se zaznamenává v bloku Uzavření incidentu.
  step_groups:
  - id: confirm_attack
    title: Potvrzení útoku a základní diagnostika
    steps:
    - action: Ověř aktuální dostupnost VPN – pokus o připojení přes Cisco AnyConnect, ICMP ping na VPN GW adresu, ověř monitoring dashboard / stavovou stránku
      example: VPN nedostupná – ping na 203.0.113.10 bez odezvy · AnyConnect hlásí 'Connection attempt failed'
    - action: 'Přihlaš se na Cisco ASA / FTD a zkontroluj: CPU utilizaci, využití paměti, počet aktuálních spojení (show conn count), počet half-open TCP spojení'
      example: 'CPU: 98 % · RAM: 92 % · Conn count: 48 200 (normál cca 800) · Half-open TCP: 42 180'
    - action: Ověř v SIEM – identifikuj aktivní alerting pravidla, potvrď korelaci s provozními statistikami (NetFlow / sFlow pokud dostupné)
      example: SIEM alert 'VPN_HIGH_CONN_RATE' aktivní od 08:12 · NetFlow potvrzuje nárůst z 50 Mbps na 4,8 Gbps
    - action: Kontaktuj Správce sítě (viz Kontaktní matice) – požaduj potvrzení abnormálního provozu ze síťových prvků a dostupnost dat z NetFlow / sFlow
      example: 'Správce sítě potvrdil: abnormální provoz na WAN rozhraní od 08:11 · NetFlow export k dispozici'
    classification_hints:
    - VPN nedostupná + abnormální provoz potvrzený na síťové vrstvě → True Positive · VPN nedostupná bez abnormálního provozu (provozní chyba, výpadek linky) → False Positive / jiný incident
  - id: attack_type_identification
    title: Identifikace typu útoku
    steps:
    - action: 'Ze síťových logů / NetFlow zjisti: objem dat (Gbps / Mbps), počet paketů (Mpps / kpps), dominantní protokol (TCP / UDP / ICMP) a cílové porty VPN'
      example: UDP · 4,8 Gbps · 6,2 Mpps · cíl UDP/443
    - action: Ověř, zda zdrojové IP adresy jsou různorodé a geograficky rozptýlené – zjisti počet unikátních zdrojových IP v časovém okně útoku (5 min)
      example: '~120 000 unikátních zdrojových IP · geolokace: CN, RU, BR, UA'
    - action: 'Na ASA/FTD ověř počet half-open TCP spojení (indikátor SYN flood) – příkaz: show conn | grep SYN'
      example: 'Half-open TCP: 42 180 (normál: < 100) → SYN flood indikátor potvrzen'
    - action: 'Ověř počet SSL/TLS handshake pokusů za sekundu na ASA (indikátor SSL/TLS exhaustion) – příkaz: show ssl statistics | grep Handshake'
      example: 'SSL handshake pokusy: 320/s (normál: < 10/s) → SSL exhaustion složka přítomna'
    - action: Dle výsledků výše urči typ útoku a pokračuj příslušnou větví Posouzení. Zaznamenej zjištění – typ bude finálně potvrzen v bloku Uzavření incidentu.
      example: 'Typ útoku: Volumetrický – UDP flood (primární) + SSL exhaustion složka (sekundární) → kombinace typů'
    hints:
    - 'Volumetrický (L3/L4): vysoký objem Gbps/Mpps, různorodé zdrojové IP, UDP/ICMP flood nebo SYN flood.'
    - 'Reflection/Amplification (L3/L4): zdrojové IP jsou veřejné servery (DNS/NTP/SSDP), pakety jsou velké, zdánlivě legitimní zdroje.'
    - 'SSL/TLS Exhaustion (L7): relativně nižší objem provozu, ale vysoký počet SSL handshake pokusů – CPU ASA zatíženo TLS processingem.'
  - id: volumetric_attack
    title: Volumetrický útok (SYN / UDP / ICMP flood)
    note: Přeskoč pokud není přítomen volumetrický útok
    condition: attack_type == 'volumetric'
    steps:
    - action: 'Zaznamenej objem útoku: Gbps, Mpps, protokol, cílový port – tyto hodnoty jsou klíčové pro ISP mitigation request'
      example: UDP flood · 4,8 Gbps · 6,2 Mpps · cíl UDP/443
    - action: Z NetFlow / sFlow identifikuj zdrojové CIDR bloky (/24 nebo větší) s nejvyšším objemem provozu – seřaď dle Gbps/Mpps sestupně
      example: 'Top bloky: 1.2.3.0/24 (0,8 Gbps) · 5.6.7.0/24 (0,6 Gbps) · dalších 22 bloků /24 identifikováno'
    - action: Ověř ASN a geolokaci top zdrojových CIDR bloků (whois, ipinfo.io, Shodan nebo interní TI) – odhadni, zda jde o botnet nebo spoofované adresy
      example: AS4134 (China Telecom) · AS8359 (MTS Russia) – pravděpodobný botnet, adresy nejsou spoofované (TTL odpovídá)
    - action: Zkontroluj, zda objem útoku přesahuje kapacitu internetové linky organizace – pokud ano, lokální opatření nestačí a je nezbytná ISP upstream mitigation
      example: 'Kapacita linky: 10 Gbps · Útok: 4,8 Gbps → linka přetížena, ISP mitigation nezbytná'
    hints:
    - Pokud objem útoku přesahuje kapacitu linky → ISP upstream mitigation je nezbytná. Kontaktuj ISP NOC (viz Kontaktní matice) bez zbytečného odkladu.
    classification_hints:
    - 'Volumetrický útok potvrzený NetFlow + VPN nedostupná → True Positive · Severity dle dopadu: výpadek VPN pro všechny uživatele → High / Critical'
  - id: reflection_amplification
    title: Reflection / Amplification útok
    note: Přeskoč pokud není přítomen reflection/amplification útok
    condition: attack_type == 'reflection'
    steps:
    - action: Ověř zdrojové IP adresy v NetFlow / sFlow – jde o veřejné DNS resolvery, NTP servery nebo SSDP zařízení? Ověř pomocí whois / Shodan.
      example: 'Zdrojové IP: otevřené NTP servery (UDP/123) · NTP amplification potvrzena'
    - action: Identifikuj typ reflection protokolu (DNS / NTP / SSDP / CLDAP / Memcached) a odhadni amplifikační faktor (poměr příchozí/odchozí u útočníka)
      example: NTP amplification · faktor ~550x · vstupní provoz útočníka ~8,7 Mbps → výstup na cíl 4,8 Gbps
    - action: Z NetFlow identifikuj zdrojové CIDR bloky reflektorů (/24 nebo větší) s nejvyšším objemem – zaznamenej jako podklad pro blokaci na FW
      example: 'Top reflektorové bloky: 5.6.7.0/24 · 9.10.11.0/24 – celkem 18 /24 bloků identifikováno'
    hints:
    - Zdrojové IP reflection útoku jsou legitimní servery třetích stran – blokací je učiníš nedostupnými pro provoz organizace. Informuj Správce sítě o vedlejším efektu blokace.
    classification_hints:
    - Reflection/amplification potvrzena + VPN nedostupná → True Positive · Severity dle délky výpadku a dopadu
  - id: ssl_exhaustion
    title: SSL / TLS Exhaustion (aplikační DDoS)
    note: Přeskoč pokud není přítomen SSL/TLS exhaustion útok
    condition: attack_type == 'ssl_exhaustion'
    steps:
    - action: 'Na ASA/FTD ověř detailní SSL statistiky: počet handshake pokusů/s, počet neúspěšných handshakes, CPU zátěž způsobenou TLS processingem'
      example: 'Handshake pokusy: 320/s · neúspěšné: 98 % · TLS CPU zátěž: 94 %'
    - action: Zjisti, zda zdrojové IP jsou unikátní nebo se opakují – SSL exhaustion může pocházet z menšího počtu IP (botnet s TLS schopností). Identifikuj zdrojové CIDR bloky (/24 nebo větší).
      example: ~2 400 unikátních zdrojových IP v rozsazích /24 · opakované pokusy ze stejných bloků
    - action: Ověř, zda je na ASA/FTD aktivní SSL session rate limiting nebo TCP SYN proxy. Pokud ne, předej Správci VPN k okamžité aktivaci (viz Kontaktní matice).
      example: SYN proxy neaktivní – předáno správci VPN k okamžité aktivaci
    hints:
    - SSL/TLS exhaustion je primárně aplikační útok (L7) – volumetrická opatření (rate limiting na L3/L4) nemusí být dostatečná. Klíčová je aktivace SYN proxy / SSL session rate limitingu přímo na ASA.
    classification_hints:
    - SSL exhaustion potvrzena (CPU ASA přetíženo TLS processingem) + VPN nedostupná → True Positive · Severity dle dopadu
  - id: source_analysis
    title: Analýza zdrojových adresních bloků
    steps:
    - action: Sestav konsolidovaný seznam zdrojových CIDR bloků (/24 nebo větší) ze všech identifikovaných typů útoku – seřaď dle objemu provozu sestupně
      example: Celkem 24 zdrojových /24 bloků – top 5 zodpovědných za 70 % celkového objemu útoku
    - action: Ověř, zda blokace těchto CIDR bloků nezpůsobí kolaterální výpadek – zkontroluj přítomnost legitimního provozu z těchto rozsahů (zaměstnanci v zahraničí, partneři, SaaS služby)
      example: 'Rozsah 1.2.3.0/24 – ověřeno v NetFlow za posledních 30 dní: žádný legitimní provoz · ostatní bloky rovněž bez legitimního provozu'
    - action: Ověř ASN vlastníky a geolokaci zdrojových CIDR bloků – zvaž geo-blocking celých zemí / regionů, pokud organizace v těchto regionech nemá uživatele
      example: CN, RU, UA, BR – organizace nemá uživatele ani obchodní partnery v těchto regionech → geo-blocking vhodný
    - action: Zaznamenej finální seznam CIDR bloků a zemí schválených k blokaci jako podklad pro Odezvu – ulož odkaz na soubor
      example: 'Seznam uložen: /evidence/INC-DDOS-2026-001/cidr_blocklist.txt · 24 bloků /24 · geo-blocking: CN, RU, UA, BR'
    hints:
    - 'POZOR: Blokace je povolena výhradně na úrovni súvislých CIDR bloků (/24 nebo větší). Blokace jednotlivých per-IP adres není povolena – generuje nekontrolovatelný počet pravidel na firewallu.'
  - id: impact_scope
    title: Dopad a scope incidentu
    steps:
    - action: Zjisti počet postižených VPN uživatelů – počet neúspěšných připojovacích pokusů z logů Cisco ASA v době útoku
      example: 820 unikátních uživatelů se pokusilo připojit a neuspělo v intervalu 08:12–09:45
    - action: Identifikuj business dopad – které systémy, aplikace nebo procesy jsou nedostupné v důsledku nedostupnosti VPN
      example: 'Nedostupné přes VPN: ERP systém, sdílené úložiště, interní portál – postiženi vzdáleně pracující uživatelé'
    - action: Ověř, zda VPN brána nebo infrastruktura za ní je součástí kritické infrastruktury (KI) dle interního registru aktiv
      example: 'VPN GW není v registru KI · systémy za VPN: ERP (KI: Ne) · SCADA přístup přes VPN (KI: ověřit!)'
    - action: Sestav timeline útoku od prvního detekovaného signálu po aktuální stav
      example: 08:11 první NetFlow anomálie · 08:12 SIEM alert · 08:14 VPN nedostupná · 08:20 SOC incident otevřen
    classification_hints:
    - VPN nedostupná pro všechny uživatele + KI dopad → True Positive, Critical · VPN nedostupná bez KI dopadu → True Positive, High · Degradovaná dostupnost (část uživatelů) → True Positive, Medium · Krátkodobý výpadek < 15 min → True Positive, Low
  - id: evidence_collection
    title: Zajištění důkazů
    steps:
    - action: 'Exportuj a ulož relevantní logy: ASA/FTD logy, NetFlow data, SIEM záznamy, firewall logy – zaznamenej cestu k uložišti'
      example: 'Uloženo: /evidence/INC-DDOS-2026-001/logs/'
    - action: Pokud je k dispozici packet capture (SPAN / TAP nebo ASA capture), exportuj vzorový pcap ze začátku útoku (min. 5 min)
      example: 'pcap uložen: /evidence/INC-DDOS-2026-001/attack_sample.pcap'
    - action: Ulož dokumentaci identifikovaných zdrojových CIDR bloků a jejich charakteristiky (ASN, geolokace, objem provozu, typ útoku)
      example: 'cidr_blocklist.txt uložen – 24 bloků /24 · celkový objem 4,8 Gbps · typ: UDP flood + NTP amplification'
- id: containment_remediation
  title: Odezva
  type: action_table
  description: Akce jsou seřazeny dle priority. Položky označené '[Pokud dostupné]' jsou podmíněny existencí příslušné technologie nebo smluvního vztahu v prostředí organizace. Blokace zdrojových adres je povolena výhradně na úrovni CIDR bloků (/24 nebo větší) – blokace per-IP není povolena.
  columns:
  - action
  - responsible_role
  - cooperation
  - status
  column_labels:
    action: Akce
    responsible_role: Zodpovědná role
    cooperation: Součinnost
    status: Stav
  status_options:
  - Provedeno
  - Probíhá
  - Čeká
  - N/A
  - Není nutné provést
  editable_columns:
  - status
  allow_append: true
  allow_delete: true
  append_row_template:
    action: null
    responsible_role: null
    cooperation: null
    status: null
  hints:
  - Akce provádět v uvedeném pořadí. Pokud lokální opatření (rate limiting, CIDR blokace) nezastaví útok do 15 minut nebo objem útoku přesahuje kapacitu linky, okamžitě eskaluj na ISP NOC.
  - Blokace zdrojových adres je povolena pouze na úrovni súvislých CIDR bloků (/24 nebo větší). Blokace per-IP adres není povolena.
  rows:
  - action: Aktivace SYN proxy / TCP intercept a session rate limitingu na Cisco ASA/FTD – omezení počtu nových TCP/UDP spojení za sekundu na VPN porty (UDP/443, TCP/443)
    responsible_role: Správce VPN
    cooperation: SOC Analytický tým
    status: null
  - action: Blokace zdrojových CIDR bloků (/24 nebo větší) na hraničním firewallu – dle seznamu připraveného v Posouzení. Blokace per-IP adres není povolena.
    responsible_role: Správce sítě / FW
    cooperation: SOC Analytický tým
    status: null
  - action: '[Pokud dostupné] Geo-blocking zdrojových zemí / regionů na hraničním FW nebo IPS – aktivuj pro regiony bez legitimního provozu organizace, dle výsledků Posouzení'
    responsible_role: Správce sítě / FW
    cooperation: Správce IPS · SOC Analytický tým
    status: null
  - action: '[Pokud dostupné] Upstream ISP mitigation – kontaktuj ISP NOC (viz Kontaktní matice), předej seznam zdrojových CIDR bloků, typ a objem útoku. Požaduj filtraci provozu před vstupem do sítě organizace.'
    responsible_role: SOC Analytický tým
    cooperation: ISP NOC · Správce sítě
    status: null
  - action: '[Pokud dostupné] BGP blackhole routing – koordinuj s ISP pro null routing zdrojových CIDR bloků na úrovni ISP routerů. Podmínkou je smluvní podpora BGP blackhole u ISP.'
    responsible_role: Správce sítě
    cooperation: ISP NOC
    status: null
  - action: '[Pokud dostupné] Přesměrování VPN provozu přes scrubbing centrum (anti-DDoS cloud, Cloudflare / Akamai / ISP scrubbing) – aktivuj dle smluvní dohody s poskytovatelem'
    responsible_role: Správce sítě
    cooperation: ISP NOC · SOC Analytický tým
    status: null
  - action: Dočasné omezení VPN přístupu – povolení připojení pouze ze známých zdrojových CIDR bloků legitimních uživatelů (whitelist). Použít jako krajní opatření při přetrvávající nedostupnosti VPN.
    responsible_role: Správce VPN
    cooperation: SOC Analytický tým
    status: null
  - action: Monitoring obnovy dostupnosti VPN – průběžně ověřuj, že legitimní uživatelé se mohou po zavedení opatření znovu připojit (testovací připojení)
    responsible_role: SOC Analytický tým
    cooperation: Správce VPN
    status: null
  - action: Informování VPN uživatelů o výpadku a předpokládané době obnovy (interní komunikace / hromadný e-mail / intranet)
    responsible_role: SOC Analytický tým
    cooperation: –
    status: null
  - action: Jiné
    responsible_role: null
    cooperation: null
    status: null
- id: communication
  title: Komunikace a notifikace
  type: action_table
  columns:
