  - communication_method
  - sla
  - note
  column_labels:
    recipient: Příjemce
    communication_method: Způsob komunikace
    sla: SLA pro notifikaci
    note: Poznámka / stav
  editable_columns:
  - note
  hints:
  - SLA je orientační. Vždy ověř požadavky dle platné legislativy (NIS2, GDPR) a interních předpisů.
  - Při výpadku VPN delším než 30 minut notifikuj CISO bez ohledu na Severity.
  rows:
  - recipient: Vlastník dotčeného aktiva (VPN GW)
    communication_method: E-mail / telefon
    sla: Do 15 min od potvrzení útoku
    note: null
