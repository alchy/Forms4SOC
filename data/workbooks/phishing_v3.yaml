template_id: phishing-v3
name: Podezřelý e-mail / Phishing v3
version: '3.0'
category: Phishing
status: active
description: Workbook pro řešení incidentů typu phishing – podezřelý nebo škodlivý e-mail (spearphishing, BEC, škodlivá příloha, URL). Posouzení, třídění a rozhodování jsou sloučeny do jednoho bloku.
mitre_tactic: Initial Access
mitre_technique: T1566 – Phishing
mitre_subtechnique: T1566.001
data_sources:
- Inbound SMTP Mail Gateway
- Proxy
- Antivirus / EDR
- Umbrella
- SIEM
