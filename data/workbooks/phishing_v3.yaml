- id: triage_investigation
  title: Posouzení, třídění a rozhodování
  type: checklist
  description: Cílem je potvrdit nebo vyvrátit bezpečnostní incident, stanovit rozsah kompromitace a připravit podklady pro Odezvu. Klasifikace (True/False Positive, Severity) se v průběhu Posouzení, třídění a rozhodování může měnit — finální klasifikace se zaznamenává v bloku Uzavření incidentu.
  step_groups:
  - id: context_artifacts
    title: Ověření kontextu a artefaktů
    steps:
    - action: Vyžádej si podezřelý e-mail ve formátu .eml nebo jako forward na dedikovanou SOC schránku
      example: E-mail přijat jako .eml
    - action: Zaznamenej odesílatele, předmět a časové razítko e-mailu
      example: 'Od: invoice@podezrely-domena.com · Předmět: "Faktura #2025-112" · Přijato: 2025-03-15 09:31'
  - id: email_analysis
    title: Analýza obsahu e-mailu
    steps:
    - action: Zkontroluj obsah e-mailu — identifikuj přítomnost přílohy, hyperlinku nebo pouze textu
      example: 'Příloha: faktura_2025.xlsx · Hyperlink přítomen v těle e-mailu'
    - action: Ověř záhlaví e-mailu (SPF, DKIM, DMARC)
      example: 'SPF: fail · DKIM: none · Doména spoofována'
  - id: reputation_check
    title: Reputace odesílatele
    steps:
    - action: 'Ověř reputaci IP adresy odesílatele — Talos: https://talosintelligence.com/reputation_center/ · NERD CESNET: https://nerd.cesnet.cz/nerd/ips · AbuseIPDB: https://www.abuseipdb.com/'
      example: 'IP 185.234.x.x: Talos – Poor · NERD CESNET – na seznamu CZ.NIC CSIRT · AbuseIPDB – 87 hlášení'
    - action: 'Ověř reputaci domény odesílatele a datum registrace — Talos: https://talosintelligence.com/reputation_center/ · IPVoid: https://www.ipvoid.com/domain-reputation-check/ · NIC.CZ (WHOIS): https://www.nic.cz/'
      example: 'podezrely-domena.com: Talos – Spam · doména registrována před 3 dny · vlastník anonymizován'
    classification_hints:
    - IP nebo doména na blacklistu + SPF fail → True Positive, navýšení severity · Čistá reputace → pokračuj analýzou obsahu
  - id: attachment_analysis
    title: E-mail obsahuje přílohu
    note: Přeskoč pokud příloha není přítomna
    condition: has_attachment == true
    steps:
    - action: Zjisti hash přílohy (MD5 / SHA256) — přílohu přímo neotvírej
      example: 'SHA256: 3a1f2b…'
    - action: Ověř hash na VirusTotal nebo interním Threat Intelligence zdroji. Pokud je detekce nízká nebo nulová a sandbox je k dispozici → odešli přílohu do sandboxu pro behaviorální analýzu (Any.Run, Joe Sandbox nebo interní sandbox)
      example: 'VT: 2/72 detekcí · sandbox: navázáno C2 spojení na 185.234.x.x'
    - action: Zjisti z AV / EDR, zda byla příloha otevřena, kým a kdy
      example: Příloha otevřena uživatelem PC-NOVAK-01 ve 09:38
    - action: Vyhledej stejný hash na ostatních endpointech přes AV / EDR — kontaktuj Správce AV/EDR (viz Kontaktní matice)
      example: Hash nalezen na PC-SVOBODA-02 a PC-KRAL-05
    hints:
    - Pokud byla příloha otevřena nebo nalezena na více zařízeních → zaznamenej všechna zasažená zařízení a rozšiř scope.
    classification_hints:
    - Hash detekován na TI a příloha otevřena → True Positive, High · Hash na TI, příloha neotvřena → True Positive, Medium · Hash na TI nedetekován → zvaž False Positive
  - id: url_analysis
    title: E-mail obsahuje URL odkaz
    note: Přeskoč pokud URL není přítomna
    condition: has_url == true
    steps:
    - action: Extrahuj URL z e-mailu — neotevírej odkaz přímo, použij defangovaný formát (např. hxxps://)
      example: hxxps://podezrely-domena[.]com/faktura
    - action: 'Ověř URL a cílovou doménu na VirusTotal / URLScan.io nebo interním TI zdroji — pro doménovou reputaci použij rovněž Talos: https://talosintelligence.com/reputation_center/ · IPVoid: https://www.ipvoid.com/domain-reputation-check/'
      example: 'URLScan.io: phishing · Talos – Poor · doména registrována před 5 dny'
    - action: Zkontroluj proxy logy — byl odkaz prokliknut? Kým? Kdy? Kontaktuj Správce Proxy (viz Kontaktní matice)
      example: 'Prokliknutí zaznamenáno 09:39 · uživatel: novakj · PC-NOVAK-01'
    - action: Zjisti, zda URL vedla na přihlašovací formulář. Pokud ano → zkontroluj přihlašovací logy (AD / Azure AD / SSO) pro postiženého uživatele v relevantním časovém okně — hledej neobvyklé nebo nové přihlášení těsně po prokliknutí
      example: 'URL vedla na falešnou O365 přihlašovací stránku · AD logy: přihlášení z neznámé IP 09:41 → kompromitace přihlašovacích údajů'
    - Zkontroluj logy z Umbrella DNS Protection pro zjištěné destinace
    hints:
    - Pokud bylo prokliknutí potvrzeno → rozšiř scope.
    - Pokud URL vedla na přihlašovací formulář a přihlášení z neznámé IP je potvrzeno → ihned resetuj heslo a zkontroluj aktivní sessions (MFA tokeny, app passwords).
    classification_hints:
    - URL phishing + prokliknutí + přihlášení z neznámé IP → True Positive, Critical · URL phishing + prokliknutí, přihlášení nezjištěno → True Positive, High · URL phishing, prokliknutí nepotvrzeno → True Positive, Medium · URL legitimní → zvaž False Positive
  - id: bec_analysis
    title: Pouze textový e-mail – BEC / Social Engineering
    note: Přeskoč pokud příloha nebo URL jsou přítomny
    condition: has_attachment == false && has_url == false
    steps:
    - action: Zhodnoť povahu žádosti — o co odesílatel žádá (převod platby, přihlašovací údaje, osobní data, sdílení souborů…)
      example: Žádost o převod platby na "nový účet dodavatele"
    - action: Zkontaktuj postiženého uživatele — byla žádost splněna? Pokud splněna → zjisti rozsah (výše transakce, sdílené údaje, přístupy)
      example: Uživatel žádost nesplnil, nahlásil ihned
    hints:
    - Pokud uživatel žádost splnil → kontaktuj CISO (viz Kontaktní matice).
    classification_hints:
    - Žádost splněna → True Positive, High/Critical · Žádost nesplněna, SPF fail → True Positive, Low/Medium · Odesílatel legitimní → zvaž False Positive
  - id: scope_correlation
    title: Rozsah kampaně a korelace
    steps:
    - action: Koreluj události napříč dostupnými zdroji, pokud je relevantní (proxy, EDR, mail gateway, SIEM)
      example: Korelace potvrdila aktivitu na 3 zařízeních, 1 s potvrzeným spuštěním přílohy
    - action: Na inbound mail gateway ověř, kolik příjemců e-mail obdrželo — kontaktuj Správce Exchange (viz Kontaktní matice)
      example: E-mail doručen 18 uživatelům ve 3 odděleních
    - action: 'Zhodnoť rozsah — cílená nebo plošná kampaň? Identifikuj scope: počet postižených uživatelů, zařízení, systémů a dat; zaznamenej seznam postižených mailboxů'
      example: 'Plošná kampaň · 3 PC · 18 mailboxů · 1 sdílený síťový disk · seznam příjemců přiložen k ticketu'
    - action: Sestav timeline události — od doručení e-mailu po aktuální stav
      example: Timeline přiložena k ticketu
    hints:
    - Pokud počet příjemců přesáhne 5 nebo jde o plošnou kampaň → zvaž rozeslání bezpečnostního upozornění (akce v sekci Odezva).
  - id: lateral_evidence
    title: Laterální pohyb a zajištění důkazů
    steps:
    - action: Ověř, zda došlo k laterálnímu pohybu nebo exfiltraci dat
      example: Laterální pohyb nezaznamenán · exfiltrace dat nezjištěna
    - action: Zajisti důkazy (evidence collection) — logy, .eml soubor, hash, screenshoty a ulož odkaz na umístění těchto souborů
      example: 'Uloženo: /evidence/INC-2025-0042/'
    classification_hints:
    - Laterální pohyb nebo exfiltrace potvrzena → True Positive, Critical / High (navýšení severity) · Laterální pohyb nezjištěn → pokračuj dle předchozí klasifikace
