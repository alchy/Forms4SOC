<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Forms4SOC{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-danger" href="/dashboard">
            <i class="bi bi-shield-lock-fill me-2"></i>Forms4SOC
        </a>
        <div class="d-flex align-items-center gap-3">
            {% if user %}
            <span class="text-muted small">
                <i class="bi bi-person-circle me-1"></i>{{ user.username }}
                <span class="badge bg-secondary ms-1">{{ user.role }}</span>
            </span>
            <a href="/logout" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Odhlásit
            </a>
            {% endif %}
        </div>
    </div>
</nav>
{% endblock %}

<div class="container-fluid">
    <div class="row">
        {% block sidebar %}{% endblock %}

        <main class="{% block main_class %}col{% endblock %} py-4 px-4">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
